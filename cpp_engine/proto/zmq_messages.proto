syntax = "proto3";

package otrader.zmq;

// -------- Gateway: Order / Trade / Commands --------

message ZmqLeg {
  int32 con_id = 1;
  string exchange = 2;
  int32 ratio = 3;
  string direction = 4;
  double price = 5;
  string symbol = 6;
  string trading_class = 7;
}

message ZmqOrderData {
  string gateway_name = 1;
  string symbol = 2;
  string exchange = 3;
  string orderid = 4;
  string trading_class = 5;
  string type = 6;
  string direction = 7;
  double price = 8;
  double volume = 9;
  double traded = 10;
  string status = 11;
  string datetime = 12;
  string reference = 13;
  bool is_combo = 14;
  repeated ZmqLeg legs = 15;
  string combo_type = 16;
}

message ZmqTradeData {
  string gateway_name = 1;
  string symbol = 2;
  string exchange = 3;
  string orderid = 4;
  string tradeid = 5;
  string direction = 6;
  double price = 7;
  double volume = 8;
  string datetime = 9;
}

message ZmqOrderRequest {
  string symbol = 1;
  string exchange = 2;
  string direction = 3;
  string type = 4;
  double volume = 5;
  double price = 6;
  string reference = 7;
  string trading_class = 8;
  bool is_combo = 9;
  repeated ZmqLeg legs = 10;
  string combo_type = 11;
}

message ZmqCancelRequest {
  string orderid = 1;
  string symbol = 2;
  string exchange = 3;
  bool is_combo = 4;
  repeated ZmqLeg legs = 5;
}

message ZmqConnectPayload {
  string host = 1;
  int32 port = 2;
  int32 client_id = 3;
  string account = 4;
}

// REQ/REP: request (cmd + payload bytes)
message ZmqRequest {
  string cmd = 1;
  bytes payload = 2;
}

// REQ/REP: response
message ZmqResponse {
  bool ok = 1;
  string orderid = 2;
  string error = 3;
}

// -------- Market Data: Snapshot / Commands --------

message ZmqPortfolioSnapshot {
  string portfolio_name = 1;
  string datetime = 2;
  double underlying_bid = 3;
  double underlying_ask = 4;
  double underlying_last = 5;
  repeated double bid = 6;
  repeated double ask = 7;
  repeated double last = 8;
  repeated double delta = 9;
  repeated double gamma = 10;
  repeated double theta = 11;
  repeated double vega = 12;
  repeated double iv = 13;
}

message ZmqSubscribeChainsPayload {
  string strategy_name = 1;
  repeated string chain_symbols = 2;
}

message ZmqUnsubscribeChainsPayload {
  string strategy_name = 1;
}
